name: Renovate github-action 1032
on:
  # This lets you dispatch a renovate job with different cache options if you want to reset or disable the cache manually.
  workflow_dispatch:
    inputs:
      log_level:
        description: "log level"
        type: string
        default: debug

jobs:
  renovate:
    name: Renovate using justfalter/renovate-github-action for issue 1032
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: false
          repository: justfalter/renovate-github-action
          ref: easier-extra-env-vars

      - name: ⚙️ Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          standalone: true

      - name: ⚙️ Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: 📥 Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile
        env:
          # Other environment variables
          HUSKY: '0' # By default do not run HUSKY install

      - name: Build
        shell: bash
        run: pnpm run build

      - name: Get token
        id: get_token
        uses: actions/create-github-app-token@v1
        with:
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          owner: ${{ github.repository_owner }}
          repositories: "renovate-test-repo"

      - name: Renovate test
        uses: ./
        env:
          LOG_LEVEL: debug
          MY_ENV_VAR: "this is important stuff"
          ANOTHER_ENV_VAR: "this is another value"
          IGNORED_ENV_VAR: "this will not pass"
        with:
          configurationFile: .github/renovate-github-action-1032.yaml
          token: "${{ steps.get_token.outputs.token }}"
          additional-env-list: |
            MY_ENV_VAR
            ANOTHER_ENV_VAR
            ENV_VAR_THAT_DOES_NOT_EXIST
